name: LerayHopf.Torus.norm_le_of_forwardSolution
tier: full
statement_ja: |
  前向き局所解のアプリオリ評価：$\nu > 0$ とし、曲線 $c$ が $[0, T]$ 上で ODE $c' = G_n(c)$ を満たすならば、$[0, T]$ 上で

  $$\lVert c(t) \rVert \le \lVert c(0) \rVert.$$
proof_ja: |
  [[Galerkin 場が各点で満たす散逸性|LerayHopf.Torus.galerkinField_inner_self_nonpos]] を確かめたうえで、散逸的な場の前向き解に対する汎用のノルム単調性定理（[[散逸場のノルム評価|LerayHopf.Galerkin.norm_le_of_forwardSolution_of_dissipative]]）に帰着する。残りは部分空間内での微分と全空間での微分を対応させること、およびノルムが部分空間の取り方に依らないことの書き換えである。
gap:
  level: none
  note: |
    解が半径 $\lVert c(0) \rVert$ の閉球から出ないというこの評価が、局所解の継ぎ足しによる前向き大域化（爆発の排除）を支える。
chapter: ode
tags: [galerkin, ode, torus]
