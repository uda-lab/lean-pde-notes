name: LerayHopf.norm_fderiv_cutoff_le
tier: gloss
statement_ja: |
  $R>0$ とし、$K$ をバンプ関数 $\chi$ の勾配ノルムの一様上界（すべての $y$ で $\lVert D\chi(y)\rVert\le K$）とする。このとき動径カットオフの勾配は次の $O(1/R)$ 評価をみたす：

  $$\lVert D\chi_R(x)\rVert\le K/R$$
