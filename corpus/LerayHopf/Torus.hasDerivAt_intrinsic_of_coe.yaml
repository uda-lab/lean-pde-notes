name: LerayHopf.Torus.hasDerivAt_intrinsic_of_coe
tier: gloss
statement_ja: |
  周囲空間で微分可能なモード空間値曲線を、部分空間内在の微分可能性へ引き戻す転送補題。[[周囲空間転送|LerayHopf.Galerkin.coe_hasDerivAt]]の逆向きで、直交射影（包含の連続線形な左逆）との合成で示す。
gap:
  level: none
  note: |
    周囲空間で述べられた既存のエネルギー・アプリオリ系を、内在曲線を要求する汎用 `Galerkin` 補題群へ接続するための私的ヘルパー。
chapter: ode
tags: [ode, torus, private-helper]
