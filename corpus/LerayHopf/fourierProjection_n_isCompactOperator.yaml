name: LerayHopf.fourierProjection_n_isCompactOperator
tier: full
statement_ja: |
  Fourier 打ち切りのコンパクト作用素性：スカラー $L^2$ 上の打ち切り $P_N$ はコンパクト作用素である（有限階作用素はコンパクト）。
proof_ja: |
  打ち切りを「有限次元部分空間への直交射影」と「部分空間の包含」の合成に分解する。有限次元部分空間は固有距離空間なので局所コンパクトであり、局所コンパクトな空間へ値を取る連続線形写像はコンパクト作用素である。コンパクト作用素は連続線形写像との合成で保たれるから、打ち切りもコンパクトになる。
gap:
  level: none
  note: |
    Rellich 埋め込みの文脈での有限階からのコンパクト性。mathlib の `isCompactOperator_of_locallyCompactSpace_dom` と `IsCompactOperator.clm_comp` で閉じる。
chapter: compactness
tags: [rellich, compact-operator, torus]
