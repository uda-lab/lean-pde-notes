name: LerayHopf.TorusConvectionExtension.convFormL2_galerkinTest_dense
tier: full
statement_ja: |
  テスト類の稠密性：任意の発散ゼロ場は Galerkin テスト関数の列の $L^2$ 極限である。
proof_ja: |
  近似列として自身の Fourier 打ち切りを取る：各打ち切りは冪等性によりテスト関数で、打ち切りの強収束（[[速度の打ち切りの強収束|LerayHopf.velocityProjection_n_tendsto]]）が発散ゼロ空間の位相（部分型の位相）でもそのまま収束を与える。
gap:
  level: none
  note: |
    決定形式の一意性（稠密な決定域上で値が決まっていること）の裏付け。
