name: LerayHopf.schwartz_h1_gradConv_aux
tier: gloss
statement_ja: |
  $f$ が Sobolev 空間 $H^1$ に属するなら、$L^2$ で $f$ に収束する Schwartz 近似列が存在し、さらにすべての方向 $m$ について、その方向微分の列が $f$ の $m$ 方向弱微分（に対応する $L^2$ 元）へ $L^2$ 収束すること。[[Schwartz 勾配収束|LerayHopf.schwartz_h1_gradConv]] の証明に用いる。
