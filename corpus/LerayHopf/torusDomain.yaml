name: LerayHopf.torusDomain
tier: full
statement_ja: |
  $\mathbb{T}^3$ の [[Galerkin 領域|LerayHopf.Galerkin.Domain]] 実現例。周囲空間を $L^2$ ベクトル場の空間、発散ゼロ部分空間をその閉部分空間、射影族を速度場の Fourier 截断射影とし、領域汎関数を $\mathbb{T}^3$ の具体物 — $H^1$ 所属述語、Stokes テスト対、粘性散逸、$H^1$ エネルギー、Galerkin テスト述語 — で埋める。一様正則性評価の被積分関数は（$\nu$ に依らない）$H^1$ エネルギーで、右辺は

  $$T\lVert u_0\rVert^2 + \frac{\lVert u_0\rVert^2}{2\nu}.$$
proof_ja: |
  各成分は既存の $\mathbb{T}^3$ 構成の読み替えである。発散ゼロ部分空間の完備性は既知の閉部分空間完備性の実現から、射影が発散ゼロ性を保つことは Fourier 截断射影の既存補題から埋める。
gap:
  level: none
  note: |
    `@[reducible]` 定義。汎関数の値が旧来の具体物と定義的に一致することは `torusDomain_stokes` などの簡約補題が固定する。
chapter: capstone-torus
