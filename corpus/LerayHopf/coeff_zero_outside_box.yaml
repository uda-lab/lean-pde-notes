name: LerayHopf.coeff_zero_outside_box
tier: full
statement_ja: |
  帯域制限場の係数の消滅：$u$ が次数 $n$ で帯域制限されているならば、周波数箱の外の Fourier 係数はすべて零である。
proof_ja: |
  打ち切りと成分射影の可換性で成分の係数を打ち切り後の係数に書き換え、打ち切りの係数公式（箱の外は零）を適用する。
gap:
  level: none
  note: |
    本 corpus で最も頻繁に引用される基本補題の一つ。import の都合で `GalerkinScheme.lean` に移設された複製である旨がソースに記録されている。
chapter: limit-passage
tags: [convection, galerkin, torus]
