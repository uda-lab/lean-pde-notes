name: LerayHopf.galerkinConvection_level_stable
tier: full
statement_ja: |
  打ち切り次数によらないこと（対称形）：$u, v$ が二つの次数 $m, n$ の両方の打ち切りで固定されるならば、どちらの次数の値も一致する。
proof_ja: |
  両者を共通の次数 $\max(m, n)$ の打ち切りに[[打ち切り次数の引き上げ|LerayHopf.galerkinConvection_level_step]]で持ち上げて比較する。
gap:
  level: none
  note: |
    「どの箱で切っても同じ」という整合性が、形式束の `b_galerkin` フィールド（すべての次数で Galerkin 形式と一致する）の well-posedness を与える。
chapter: limit-passage
tags: [convection, galerkin, torus]
